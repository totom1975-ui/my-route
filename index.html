<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaminTransbus - Маршрут Водія</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
        .arrive-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } }
        .map-container { height: 300px; width: 100%; }
        .point-card { transition: all 0.3s; }
        .point-card.current { border-left: 4px solid #10b981; background: #f0fdf4; }
        .point-card.completed { border-left: 4px solid #6b7280; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-4">
            <h1 class="text-xl font-bold">🚚 KaminTransbus</h1>
            <p class="text-sm opacity-80" id="routeName">Завантаження...</p>
            
            <!-- Переключатель маршрутов -->
            <select id="routeSelector" onchange="changeRoute()" class="mt-2 w-full p-2 rounded-lg text-gray-800">
                <option value="Точки">Маршрут 1</option>
                <option value="Точки2">Маршрут 2</option>
            </select>
        </header>

        <!-- Map -->
        <div id="map" class="map-container"></div>

        <!-- Stats -->
        <div class="p-4 bg-gray-50">
            <div class="flex justify-between text-center">
                <div><p class="text-2xl font-bold" id="totalPoints">0</p><p class="text-xs text-gray-500">Всього</p></div>
                <div><p class="text-2xl font-bold" id="completedPoints">0</p><p class="text-xs text-gray-500">Виконано</p></div>
                <div><p class="text-2xl font-bold" id="remainingPoints">0</p><p class="text-xs text-gray-500">Залишилось</p></div>
            </div>
        </div>

        <!-- Current Stop -->
        <div class="p-4 border-b">
            <p class="text-xs text-gray-500 mb-1">📍 Поточна адреса</p>
            <p class="font-bold text-lg" id="currentAddress">-</p>
            <p class="text-sm text-gray-600" id="currentPhone">-</p>
        </div>

        <!-- Next Stop -->
        <div class="p-4 bg-blue-50">
            <p class="text-xs text-blue-600 mb-1">⏭️ Наступна адреса</p>
            <p class="font-bold text-lg" id="nextAddress">-</p>
            <p class="text-sm text-gray-600" id="nextPhone">-</p>
        </div>

        <!-- Action Button -->
        <div class="p-4">
            <button onclick="markArrived()" class="arrive-btn w-full text-white py-4 rounded-2xl font-bold text-lg">
                ✅ ПРИБУВ
            </button>
        </div>

        <!-- Points List -->
        <div class="p-4 pb-24">
            <h3 class="font-bold mb-2">📋 Всі точки</h3>
            <div id="pointsList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let map, markers = [];
        let points = [], currentIndex = 0;
        
        // URL для API (Google Apps Script Web App)
        const API_URL = 'https://script.google.com/macros/s/AKfycbxuXIVKcUdkZqT7I8VNQDTOAHQM5XWUq6SRr3lhmWRaVn_n9E4a-1az6i73H-cmQu4JuQ/exec';
        
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        let routeSpreadsheetId = urlParams.get('routeSpreadsheetId');
        let routeName = urlParams.get('routeName') || 'Точки';

        // Инициализация
        async function init() {
            document.getElementById('routeName').textContent = routeName === 'Точки' ? 'Маршрут 1' : 'Маршрут 2';
            document.getElementById('routeSelector').value = routeName;
            await loadPoints();
            initMap();
            updateUI();
        }

        // Смена маршрута
        function changeRoute() {
            routeName = document.getElementById('routeSelector').value;
            document.getElementById('routeName').textContent = routeName === 'Точки' ? 'Маршрут 1' : 'Маршрут 2';
            loadPoints().then(() => {
                updateUI();
                updateMapMarkers();
            });
        }

        // Загрузка точек
        async function loadPoints() {
            try {
                const response = await fetch(`${API_URL}?action=getRouteData&routeSpreadsheetId=${routeSpreadsheetId}&routeName=${routeName}`);
                const data = await response.json();
                points = data.points || [];
                currentIndex = points.findIndex(p => p.status !== 'Виконано');
                if (currentIndex < 0) currentIndex = 0;
            } catch (e) {
                console.error('Error loading points:', e);
                points = [];
            }
        }

        // Инициализация карты
        function initMap() {
            map = L.map('map').setView([51.505, 7.5], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            updateMapMarkers();
        }

        // Обновление маркеров
        function updateMapMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            points.forEach((p, i) => {
                if (p.lat && p.lng) {
                    const color = i === currentIndex ? 'green' : p.status === 'Виконано' ? 'gray' : 'blue';
                    const marker = L.marker([p.lat, p.lng], {
                        icon: L.divIcon({
                            className: 'custom-marker',
                            html: `<div style="background:${color};width:20px;height:20px;border-radius:50%;border:2px solid white;"></div>`
                        })
                    }).addTo(map);
                    marker.bindPopup(`<b>${p.address}</b><br>${p.phone}`);
                    markers.push(marker);
                }
            });
            
            if (markers.length > 0) {
                map.fitBounds(markers.map(m => m.getLatLng()));
            }
        }

        // Обновление UI
        function updateUI() {
            document.getElementById('totalPoints').textContent = points.length;
            document.getElementById('completedPoints').textContent = points.filter(p => p.status === 'Виконано').length;
            document.getElementById('remainingPoints').textContent = points.filter(p => p.status !== 'Виконано').length;

            const current = points[currentIndex];
            const next = points[currentIndex + 1];

            if (current) {
                document.getElementById('currentAddress').textContent = current.address;
                document.getElementById('currentPhone').textContent = current.phone;
            } else {
                document.getElementById('currentAddress').textContent = 'Маршрут завершено!';
                document.getElementById('currentPhone').textContent = '';
            }

            if (next) {
                document.getElementById('nextAddress').textContent = next.address;
                document.getElementById('nextPhone').textContent = next.phone;
            } else {
                document.getElementById('nextAddress').textContent = '-';
                document.getElementById('nextPhone').textContent = '-';
            }

            renderPointsList();
        }

        // Список точек
        function renderPointsList() {
            const container = document.getElementById('pointsList');
            container.innerHTML = points.map((p, i) => `
                <div class="point-card p-3 rounded-lg border ${i === currentIndex ? 'current' : p.status === 'Виконано' ? 'completed' : 'bg-white'}">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="font-semibold">${p.address}</p>
                            <p class="text-sm text-gray-500">${p.phone}</p>
                        </div>
                        <span class="text-xs px-2 py-1 rounded ${p.status === 'Виконано' ? 'bg-green-200 text-green-700' : 'bg-gray-200'}">
                            ${p.status === 'Виконано' ? '✓' : i + 1}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // Прибыл на точку
        async function markArrived() {
            if (currentIndex >= points.length) {
                alert('🎉 Маршрут завершено!');
                return;
            }

            // Отправляем обновление в Google Sheets
            await fetch(`${API_URL}?action=markCompleted&routeSpreadsheetId=${routeSpreadsheetId}&pointIndex=${currentIndex + 1}`, {
                method: 'post'
            });

            // Уведомляем следующего клиента
            if (currentIndex + 1 < points.length) {
                await fetch(`${API_URL}?action=notifyNext&routeSpreadsheetId=${routeSpreadsheetId}&pointIndex=${currentIndex + 2}`, {
                    method: 'post'
                });
            }

            points[currentIndex].status = 'Виконано';
            currentIndex++;

            updateUI();
            updateMapMarkers();

            if (currentIndex >= points.length) {
                alert('🎉 Маршрут завершено!');
            }
        }

        // Запуск
        init();

        // Авто-обновление каждые 30 секунд
        setInterval(() => {
            loadPoints().then(updateUI);
        }, 30000);
    </script>
</body>
</html>
