<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Мой Маршрут</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <style>
        /* Делаем так, чтобы карта занимала весь экран телефона */
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // Ваш личный ключ для карты Mapbox
    mapboxgl.accessToken = 'pk.eyJ1Ijoia2FtaW5idXMiLCJhIjoiY21uN2U1MzV3MDAwYTJzcjcyMHVrdTlkYiJ9.TJfvFbIJ5SRywWcf4r_teA';

    // 1. Читаем ссылку и достаем из нее маршрут
    const urlParams = new URLSearchParams(window.location.search);
    const routeParam = urlParams.get('route');

    let coordinates = [];
    
    // Если в ссылке есть маршрут, разбиваем его на точки
    if (routeParam) {
        const points = routeParam.split(';');
        points.forEach(point => {
            const coords = point.split(',');
            if (coords.length === 2) {
                coordinates.push([parseFloat(coords[0]), parseFloat(coords[1])]);
            }
        });
    }

    // 2. Создаем саму карту
    // Если точки есть, ставим центр на первую точку. Если нет — на Gronau.
    const startCenter = coordinates.length > 0 ? coordinates[0] : [7.0089, 52.2108]; 
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/navigation-day-v1', // Красивый стиль для навигатора
        center: startCenter,
        zoom: 12
    });

    // Добавляем кнопочки плюс и минус на экран
    map.addControl(new mapboxgl.NavigationControl());

    // 3. Когда карта прогрузится, рисуем наш путь
    map.on('load', () => {
        if (coordinates.length === 0) {
            alert('Маршрут не найден! Проверьте ссылку.');
            return;
        }

        // Рисуем синюю линию по нашим точкам
        map.addSource('route', {
            'type': 'geojson',
            'data': {
                'type': 'Feature',
                'properties': {},
                'geometry': {
                    'type': 'LineString',
                    'coordinates': coordinates
                }
            }
        });

        map.addLayer({
            'id': 'route',
            'type': 'line',
            'source': 'route',
            'layout': {
                'line-join': 'round',
                'line-cap': 'round'
            },
            'paint': {
                'line-color': '#3887be', // Цвет линии
                'line-width': 6,         // Толщина линии
                'line-opacity': 0.8
            }
        });

        // 4. Ставим красивые булавки на каждый адрес
        const bounds = new mapboxgl.LngLatBounds();

        coordinates.forEach((coord, index) => {
            // Первая точка (Старт) будет красной, остальные зелеными
            const markerColor = index === 0 ? '#ff0000' : '#00aa00';
            const popupText = index === 0 ? 'Старт' : 'Точка ' + index;

            new mapboxgl.Marker({ color: markerColor })
                .setLngLat(coord)
                .setPopup(new mapboxgl.Popup({ offset: 25 }).setText(popupText))
                .addTo(map);

            // Растягиваем невидимую рамку, чтобы охватить все точки
            bounds.extend(coord);
        });

        // Приказываем карте отдалиться так, чтобы было видно весь маршрут целиком
        map.fitBounds(bounds, { padding: 50 });
    });
</script>

</body>
</html>
